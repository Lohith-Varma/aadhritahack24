<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loom — You're Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
    }

    p {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      background: #6366f1;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      margin-bottom: 2rem;
    }

    button {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .tip {
      margin-top: 1.5rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.8rem;
      color: #64748b;
      text-align: left;
    }

    .tip strong { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌙</div>
    <span class="badge">🧵 Loom</span>
    <h1>You're Offline</h1>
    <p>
      No internet connection detected. Your previously loaded dashboard
      and logs are still available from cache.
    </p>

    <button onclick="window.location.reload()">
      🔄 Try Again
    </button>

    <div class="tip">
      <strong>💡 Offline Tip:</strong> Your last 24 hours of dashboard data
      and all simulator/pattern pages are cached locally and will load
      without internet.
    </div>
  </div>
</body>
</html>
